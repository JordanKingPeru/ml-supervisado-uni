version: '3.8'

services:
  credit-scoring-app:
    build: .
    container_name: credit-scoring
    ports:
      - "8501:8501"
    restart: unless-stopped
    # Opcional: variables de entorno
    environment:
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_BROWSER_GATHER_USAGE_STATS=false
    # Opcional: límites de recursos
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
