<svg viewBox="0 0 880 250" xmlns="http://www.w3.org/2000/svg">
  <style>
    .box { fill:#f4f7fb; stroke:#3498db; stroke-width:2.5; }
    .model { fill:#fbeef2; stroke:#8B1538; stroke-width:3; }
    .user { fill:#eaf6ef; stroke:#2e8b57; stroke-width:3; }
    .tx { font:bold 17px 'Segoe UI',sans-serif; fill:#2c3e50; text-anchor:middle; }
    .txs { font:13px 'Segoe UI',sans-serif; fill:#7f8c8d; text-anchor:middle; }
    .e { stroke:#8B1538; stroke-width:2.6; fill:none; }
    .el { font:13px 'Segoe UI',sans-serif; fill:#8B1538; text-anchor:middle; }
  </style>
  <g>
    <rect class="box" x="20" y="95" width="150" height="70" rx="10"/>
    <text x="95" y="128" text-anchor="middle" font-size="30">📓</text>
    <text class="tx" x="95" y="154">Notebook</text>
  </g>
  <path class="e" d="M170 130 H240"/><text class="el" x="205" y="120">entrena</text>
  <g>
    <rect class="model" x="240" y="95" width="160" height="70" rx="10"/>
    <text x="320" y="126" text-anchor="middle" font-size="28">💾</text>
    <text class="tx" x="320" y="152" fill="#8B1538">modelo.joblib</text>
  </g>
  <path class="e" d="M400 130 H470"/><text class="el" x="435" y="120">carga</text>
  <g>
    <rect class="box" x="470" y="80" width="180" height="100" rx="10"/>
    <text x="560" y="116" text-anchor="middle" font-size="26">🖥️ / 🔗</text>
    <text class="tx" x="560" y="142">App / API</text>
    <text class="txs" x="560" y="162">Streamlit · FastAPI</text>
  </g>
  <path class="e" d="M650 130 H720"/><text class="el" x="685" y="120">predice</text>
  <g>
    <rect class="user" x="720" y="95" width="140" height="70" rx="10"/>
    <text x="790" y="126" text-anchor="middle" font-size="28">👤</text>
    <text class="tx" x="790" y="152" fill="#2e8b57">Usuario</text>
  </g>
  <text x="440" y="30" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="18" font-weight="bold" fill="#2c3e50">Del notebook a producción: serializar el modelo y servirlo en una app/API</text>
  <text x="440" y="222" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="14" fill="#7f8c8d">El modelo se entrena una vez y se reutiliza en milisegundos por cada petición</text>
</svg>
